# Industrial Brain AI — local development stack (Milestone 1.9)
# Usage (repo root):
#   cp .env.example .env
#   docker compose up --build
#
# Browser URLs use localhost; service-to-service URLs use Compose DNS names.

name: industrial-brain

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-industrial_brain}
      POSTGRES_USER: ${POSTGRES_USER:-industrial_brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-industrial_brain} -d ${POSTGRES_DB:-industrial_brain}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - industrial-brain

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - industrial-brain

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - industrial-brain

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-industrial-brain}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${STORAGE_BUCKET}"
        echo "MinIO bucket ready: $${STORAGE_BUCKET}"
    networks:
      - industrial-brain
    restart: "no"

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-change-me-neo4j}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:7474 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - industrial-brain

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # No app dependency yet (Phase 2); keep the service up for local wiring.
    networks:
      - industrial-brain

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-Industrial Brain AI}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-industrial_brain}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-industrial_brain}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-industrial-brain}
      STORAGE_USE_SSL: "false"
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-jwt}
      CORPUS_SOURCE: ${CORPUS_SOURCE:-local}
      CORPUS_LOCAL_ROOT: ${CORPUS_LOCAL_ROOT:-/corpus}
      SEED_ON_START: ${SEED_ON_START:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: ${CORPUS_HOST_PATH:-./docker/corpus-placeholder}
        target: /corpus
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - industrial-brain

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
      ]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-industrial_brain}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-industrial_brain}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-industrial-brain}
      STORAGE_USE_SSL: "false"
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me-neo4j}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CORPUS_SOURCE: ${CORPUS_SOURCE:-local}
      CORPUS_LOCAL_ROOT: ${CORPUS_LOCAL_ROOT:-/corpus}
    volumes:
      - type: bind
        source: ${CORPUS_HOST_PATH:-./docker/corpus-placeholder}
        target: /corpus
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - industrial-brain

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: ${WEB_BUILD_TARGET:-production}
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - industrial-brain

networks:
  industrial-brain:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
